<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IR Empreendedor — Declaração Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.20);
      --text: #1a1a18;
      --text-2: #5c5c58;
      --text-3: #9a9a94;
      --accent: #1a3a2a;
      --accent-light: #e8f0ec;
      --accent-text: #0d2418;
      --warning-bg: #fef9ec;
      --warning-text: #92600a;
      --warning-border: rgba(146,96,10,0.25);
      --info-bg: #edf4fb;
      --info-text: #1a4a7a;
      --info-border: rgba(26,74,122,0.20);
      --success-bg: #edf7f0;
      --success-text: #1a5c32;
      --success-border: rgba(26,92,50,0.20);
      --danger-bg: #fdf0f0;
      --danger-text: #8c2020;
      --danger-border: rgba(140,32,32,0.20);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0 0;
      margin-bottom: 2.5rem;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text-3); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; margin-left: 8px; }

    /* ── Progress ── */
    .progress-wrap { width: 100%; max-width: 760px; margin-bottom: 2rem; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
    .progress-bar-track { height: 3px; background: var(--border); border-radius: 99px; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

    .dots { display: flex; gap: 6px; margin-top: 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); transition: all 0.25s; }
    .dot.active { background: var(--accent); width: 18px; border-radius: 3px; }
    .dot.done { background: var(--accent); opacity: 0.35; }

    /* ── Main card ── */
    .main { width: 100%; max-width: 760px; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; line-height: 1.35; }
    .card .hint { font-size: 13px; color: var(--text-2); margin-bottom: 1.5rem; line-height: 1.6; }

    /* ── Option grid ── */
    .option-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .opt-btn {
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .opt-btn:hover { background: var(--bg); border-color: var(--accent); }
    .opt-btn.selected { border: 2px solid var(--accent); background: var(--accent-light); }
    .opt-btn .opt-icon { font-size: 22px; margin-bottom: 6px; }
    .opt-btn .opt-label { font-size: 14px; font-weight: 500; color: var(--text); display: block; }
    .opt-btn .opt-desc { font-size: 11px; color: var(--text-3); margin-top: 3px; display: block; line-height: 1.4; }

    /* ── Input ── */
    .input-money-wrap { position: relative; }
    .currency-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-3);
      font-weight: 500;
      pointer-events: none;
    }
    input[type="number"] {
      width: 100%;
      padding: 14px 14px 14px 42px;
      font-size: 20px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); background: var(--surface); }
    .input-hint { font-size: 12px; color: var(--text-3); margin-top: 6px; }

    /* ── Nav ── */
    .nav { display: flex; gap: 10px; margin-top: 2rem; }
    .btn {
      padding: 12px 22px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
    }
    .btn:hover { background: var(--bg); }
    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-text); }
    .btn-secondary { min-width: 100px; }

    /* ── Results ── */
    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      animation: fadeUp 0.3s ease both;
    }
    .result-card:nth-child(2) { animation-delay: 0.05s; }
    .result-card:nth-child(3) { animation-delay: 0.10s; }
    .result-card:nth-child(4) { animation-delay: 0.15s; }
    .result-card:nth-child(5) { animation-delay: 0.20s; }
    .result-card:nth-child(6) { animation-delay: 0.25s; }

    .result-header {
      padding: 1rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-header h3 { font-size: 15px; font-weight: 500; }
    .result-body { padding: 1.5rem; }

    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .metric .m-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .metric .m-value { font-size: 22px; font-weight: 600; color: var(--text); }
    .metric .m-value.danger { color: var(--danger-text); }
    .metric .m-value.success { color: var(--success-text); }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
      gap: 12px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row .item-label { color: var(--text-2); flex: 1; }
    .item-row .item-value { font-weight: 500; text-align: right; white-space: nowrap; }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .alert:last-child { margin-bottom: 0; }
    .alert.info { background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); }
    .alert.warning { background: var(--warning-bg); color: var(--warning-text); border: 0.5px solid var(--warning-border); }
    .alert.success { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-border); }
    .alert.danger { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.ok { background: var(--success-bg); color: var(--success-text); }
    .badge.aten { background: var(--warning-bg); color: var(--warning-text); }

    .checklist { list-style: none; }
    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      font-size: 13px;
      color: var(--text-2);
      border-bottom: 0.5px solid var(--border);
      line-height: 1.5;
    }
    .checklist li:last-child { border-bottom: none; }
    .ck {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--success-bg);
      color: var(--success-text);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2rem; }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
      max-width: 600px;
      line-height: 1.7;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 540px) {
      .card { padding: 1.25rem; }
      .option-grid { grid-template-columns: 1fr 1fr; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">IR Empreendedor <span>v1.0</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="step-label">Passo 1</span>
    <span id="step-pct">0%</span>
  </div>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="dots" id="dots"></div>
</div>

<div class="main" id="app"></div>

<footer>
  ⚠️ Esta ferramenta é apenas orientativa. Os valores calculados são estimativas baseadas nas regras gerais do IR 2025 (ano-base 2024).
  Para a declaração oficial, consulte um contador ou acesse <a href="https://www.gov.br/receitafederal" target="_blank">gov.br/receitafederal</a>.
</footer>

<script>
  const STEPS = [
    {
      id: 'tipo',
      title: 'Qual é o seu tipo de empresa?',
      hint: 'Escolha a categoria que melhor descreve sua situação atual.',
      type: 'options',
      options: [
        { key: 'mei',      icon: '🧑‍💼', label: 'MEI',            desc: 'Microempreendedor Individual' },
        { key: 'me',       icon: '🏪', label: 'Microempresa',   desc: 'ME — faturamento até R$ 360 mil/ano' },
        { key: 'epp',      icon: '🏢', label: 'Pequeno porte',  desc: 'EPP — até R$ 4,8 mi/ano' },
        { key: 'autonomo', icon: '🧑‍🔧', label: 'Autônomo / PF', desc: 'Presta serviços como pessoa física' },
      ]
    },
    {
      id: 'regime',
      title: 'Qual é o regime tributário?',
      hint: 'Se não souber, selecione Simples Nacional — é o mais comum para MEI/ME.',
      type: 'options',
      options: [
        { key: 'simples',           icon: '📋', label: 'Simples Nacional',  desc: 'Regime unificado de tributos' },
        { key: 'lucro_presumido',   icon: '📊', label: 'Lucro Presumido',   desc: 'IRPJ calculado sobre margem estimada' },
        { key: 'lucro_real',        icon: '📈', label: 'Lucro Real',        desc: 'IRPJ sobre lucro efetivo' },
        { key: 'nao_sei',           icon: '❓', label: 'Não sei',           desc: 'Te ajudamos a descobrir' },
      ]
    },
    {
      id: 'faturamento',
      title: 'Faturamento bruto anual (2024)',
      hint: 'Informe o total que sua empresa recebeu no ano — antes de descontar qualquer despesa.',
      type: 'money',
      field: 'faturamento',
      placeholder: '80000'
    },
    {
      id: 'despesas',
      title: 'Total de despesas dedutíveis (2024)',
      hint: 'Inclua: aluguel, materiais, energia, salários de funcionários, contabilidade, marketing, etc.',
      type: 'money',
      field: 'despesas',
      placeholder: '25000'
    },
    {
      id: 'prolabore',
      title: 'Você retira pró-labore?',
      hint: 'Pró-labore é a remuneração formal do sócio/dono registrada em folha. Sobre ele incide INSS e IR.',
      type: 'options',
      options: [
        { key: 'sim', icon: '✅', label: 'Sim', desc: 'Retiro valor mensalmente' },
        { key: 'nao', icon: '❌', label: 'Não', desc: 'Não faço retirada formal' },
      ]
    },
    {
      id: 'prolabore_valor',
      title: 'Valor total do pró-labore em 2024',
      hint: 'Some os valores de todos os meses do ano.',
      type: 'money',
      field: 'prolabore_valor',
      placeholder: '36000',
      skipIf: () => state.prolabore === 'nao'
    },
    {
      id: 'outras_rendas',
      title: 'Você teve outras fontes de renda em 2024?',
      hint: 'Exemplo: aluguéis recebidos, salário CLT de outro emprego, dividendos, aplicações financeiras, etc.',
      type: 'options',
      options: [
        { key: 'sim', icon: '💰', label: 'Sim', desc: 'Tive outras rendas' },
        { key: 'nao', icon: '🚫', label: 'Não', desc: 'Apenas minha empresa' },
      ]
    },
    {
      id: 'outras_rendas_valor',
      title: 'Total de outras rendas em 2024',
      hint: 'Some todas as outras fontes de renda ao longo do ano.',
      type: 'money',
      field: 'outras_rendas_valor',
      placeholder: '12000',
      skipIf: () => state.outras_rendas === 'nao'
    },
    {
      id: 'dependentes',
      title: 'Quantos dependentes você declara?',
      hint: 'Filhos, cônjuge sem renda, pais dependentes. Cada dependente reduz a base de cálculo do IR.',
      type: 'options',
      options: [
        { key: '0',  icon: '0️⃣', label: 'Nenhum',       desc: '' },
        { key: '1',  icon: '1️⃣', label: '1 dependente', desc: '' },
        { key: '2',  icon: '2️⃣', label: '2 dependentes', desc: '' },
        { key: '3+', icon: '3️⃣', label: '3 ou mais',    desc: '' },
      ]
    },
    {
      id: 'deducoes',
      title: 'Despesas dedutíveis pessoais (2024)',
      hint: 'Gastos com saúde (ilimitado), educação (até R$ 3.561,50 por pessoa), previdência privada PGBL (até 12% da renda).',
      type: 'money',
      field: 'deducoes',
      placeholder: '8000'
    },
  ];

  const state = {};
  let currentStep = 0;
  let visibleSteps = [];

  function buildVisible() {
    visibleSteps = STEPS.filter(s => !s.skipIf || !s.skipIf());
  }

  function fmt(v) {
    return new Intl.NumberFormat('pt-BR', {
      style: 'currency', currency: 'BRL',
      minimumFractionDigits: 0, maximumFractionDigits: 0
    }).format(v || 0);
  }

  function parseVal(s) {
    return parseFloat((s || '').toString().replace(/\./g, '').replace(',', '.')) || 0;
  }

  function renderDots() {
    const el = document.getElementById('dots');
    el.innerHTML = visibleSteps.map((_, i) => {
      let cls = 'dot';
      if (i < currentStep) cls += ' done';
      else if (i === currentStep) cls += ' active';
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function updateProgress() {
    const pct = Math.round(((currentStep + 1) / visibleSteps.length) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('step-pct').textContent = pct + '%';
    document.getElementById('step-label').textContent = `Passo ${currentStep + 1} de ${visibleSteps.length}`;
  }

  function renderStep(step) {
    const app = document.getElementById('app');
    let opts = '';

    if (step.type === 'options') {
      opts = `<div class="option-grid">` +
        step.options.map(o => {
          const sel = state[step.id] === o.key ? 'selected' : '';
          return `<button class="opt-btn ${sel}" onclick="selectOpt('${step.id}','${o.key}',this)">
            <div class="opt-icon">${o.icon}</div>
            <span class="opt-label">${o.label}</span>
            ${o.desc ? `<span class="opt-desc">${o.desc}</span>` : ''}
          </button>`;
        }).join('') + `</div>`;
    } else if (step.type === 'money') {
      const cur = state[step.field] || '';
      opts = `<div class="input-money-wrap">
        <span class="currency-prefix">R$</span>
        <input type="number" id="money-input" min="0" step="1"
          placeholder="${step.placeholder}" value="${cur}"
          oninput="state['${step.field}']=this.value" />
      </div>
      <p class="input-hint">Digite apenas o valor numérico em reais (sem vírgulas ou pontos)</p>`;
    }

    app.innerHTML = `<div class="card">
      <span class="step-badge">Passo ${currentStep + 1} de ${visibleSteps.length}</span>
      <h2>${step.title}</h2>
      <p class="hint">${step.hint}</p>
      ${opts}
      <div class="nav">
        ${currentStep > 0 ? `<button class="btn btn-secondary" onclick="goBack()">← Voltar</button>` : ''}
        <button class="btn btn-primary" onclick="goNext()">
          ${currentStep === visibleSteps.length - 1 ? 'Ver meu resultado →' : 'Próximo →'}
        </button>
      </div>
    </div>`;

    if (step.type === 'money') {
      const inp = document.getElementById('money-input');
      if (inp) setTimeout(() => inp.focus(), 50);
    }
  }

  function selectOpt(id, key, el) {
    state[id] = key;
    el.closest('.option-grid').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  function goNext() {
    const step = visibleSteps[currentStep];
    if (step.type === 'options' && !state[step.id]) {
      alert('Por favor, selecione uma opção para continuar.');
      return;
    }
    if (step.type === 'money' && !state[step.field]) {
      alert('Por favor, informe o valor para continuar. Se for zero, coloque 0.');
      return;
    }
    if (currentStep === visibleSteps.length - 1) {
      buildVisible();
      showResult();
      return;
    }
    currentStep++;
    buildVisible();
    renderDots();
    updateProgress();
    renderStep(visibleSteps[currentStep]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack() {
    if (currentStep > 0) {
      currentStep--;
      buildVisible();
      renderDots();
      updateProgress();
      renderStep(visibleSteps[currentStep]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ── Cálculos ──────────────────────────────────────────────────────────────
  function calcResult() {
    const tipo     = state.tipo || 'mei';
    const regime   = state.regime || 'simples';
    const fat      = parseVal(state.faturamento);
    const desp     = parseVal(state.despesas);
    const prolabore     = state.prolabore === 'nao' ? 0 : parseVal(state.prolabore_valor);
    const outrasRendas  = state.outras_rendas === 'nao' ? 0 : parseVal(state.outras_rendas_valor);
    const deps     = state.dependentes === '3+' ? 3 : parseInt(state.dependentes || '0');
    const dedPessoais = parseVal(state.deducoes);

    const lucro = Math.max(0, fat - desp);

    // Tabela progressiva IRPF 2025 (ano-base 2024)
    const DEDUCAO_DEP = 2275.08;
    const tabela = [
      { ate: 28559.70,  aliq: 0,     ded: 0        },
      { ate: 33919.80,  aliq: 0.075, ded: 2141.98  },
      { ate: 45012.60,  aliq: 0.15,  ded: 4604.96  },
      { ate: 55976.16,  aliq: 0.225, ded: 7942.50  },
      { ate: Infinity,  aliq: 0.275, ded: 10750.00 },
    ];

    const rendaTributavel = prolabore + outrasRendas;
    const deducaoDeps = deps * DEDUCAO_DEP;
    const base = Math.max(0, rendaTributavel - deducaoDeps - dedPessoais);

    let irDevido = 0;
    for (const f of tabela) {
      if (base <= f.ate) { irDevido = Math.max(0, base * f.aliq - f.ded); break; }
    }

    // Estimativa tributos PJ
    let impostoPJ = 0;
    if (tipo === 'mei') {
      impostoPJ = 0; // MEI paga DAS fixo mensal — não calculado aqui
    } else if (regime === 'simples') {
      const aliq = fat <= 180000 ? 0.04 : fat <= 360000 ? 0.073 : 0.095;
      impostoPJ = fat * aliq;
    } else if (regime === 'lucro_presumido') {
      impostoPJ = fat * 0.32 * 0.15;
    } else if (regime === 'lucro_real') {
      impostoPJ = lucro * 0.15;
    }

    const obrigado = rendaTributavel > 28559.70 || fat > 150000 || outrasRendas > 0;

    return {
      tipo, regime, fat, desp, lucro, prolabore, outrasRendas,
      deps, deducaoDeps, dedPessoais, base, irDevido,
      impostoPJ, obrigado, rendaTributavel
    };
  }

  // ── Resultado ─────────────────────────────────────────────────────────────
  function showResult() {
    const r = calcResult();
    const app = document.getElementById('app');
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('step-pct').textContent = '100%';
    document.getElementById('step-label').textContent = 'Resultado';
    document.getElementById('dots').innerHTML = '';

    const obrigBadge = r.obrigado
      ? `<span class="badge aten">obrigado a declarar</span>`
      : `<span class="badge ok">verifique com contador</span>`;

    let regimeDica = '';
    if (r.tipo === 'mei') {
      regimeDica = 'Como MEI, você é isento de IRPJ — mas declara o IR pessoal normalmente. Além disso, é obrigado a entregar a DASN-SIMEI (declaração anual do MEI) até 31 de maio.';
    } else if (r.regime === 'simples') {
      regimeDica = 'No Simples Nacional, os tributos PJ já estão unificados no DAS mensal. Seu IR pessoal incide sobre o pró-labore — a distribuição de lucros isenta não entra na base de cálculo.';
    } else if (r.regime === 'lucro_presumido') {
      regimeDica = 'No Lucro Presumido, a Receita presume uma margem de lucro. Lucros distribuídos até o valor presumido são isentos de IR para o sócio; o excedente deve ser tributado.';
    } else if (r.regime === 'lucro_real') {
      regimeDica = 'No Lucro Real, você apura o lucro efetivo e o IRPJ é calculado sobre ele. A distribuição de lucros ao sócio é isenta de IR, o que pode ser muito vantajoso.';
    } else {
      regimeDica = 'Identificar o regime correto é essencial. Converse com um contador para descobrir qual regime sua empresa está enquadrada.';
    }

    let prazoHtml = '';
    if (r.tipo === 'mei') {
      prazoHtml = `
        <div class="item-row"><span class="item-label">DASN-SIMEI (declaração anual MEI)</span><span class="item-value">Até 31/05/2025</span></div>
        <div class="item-row"><span class="item-label">IRPF — Imposto de Renda pessoa física</span><span class="item-value">Até 30/05/2025</span></div>`;
    } else {
      prazoHtml = `
        <div class="item-row"><span class="item-label">IRPF — Imposto de Renda pessoa física</span><span class="item-value">Até 30/05/2025</span></div>
        <div class="item-row"><span class="item-label">DCTF / IRPJ empresa</span><span class="item-value">Mensal ou trimestral</span></div>
        <div class="item-row"><span class="item-label">ECF (Escrituração Contábil Fiscal)</span><span class="item-value">Até 31/07/2025</span></div>`;
    }

    let dicas = [];
    if (r.deps > 0)         dicas.push('✔ Inclua todos os dependentes na declaração — cada um reduz R$ 2.275,08 da base tributável.');
    if (r.dedPessoais < 3000) dicas.push('✔ Guarde todos os recibos médicos — despesas de saúde são 100% dedutíveis, sem limite.');
    if (r.regime === 'simples' && r.fat > 300000)
      dicas.push('✔ Com faturamento acima de R$ 300 mil, avalie com seu contador se o Lucro Presumido seria mais vantajoso.');
    if (r.prolabore === 0 && r.tipo !== 'mei' && r.tipo !== 'autonomo')
      dicas.push('✔ Sem pró-labore, você pode perder direitos previdenciários. Formalize uma retirada mínima.');
    if (r.irDevido > 0)
      dicas.push('✔ Você pode parcelar o IR em até 8 quotas mensais — a primeira no prazo da entrega e as demais até o último dia útil de cada mês.');
    dicas.push('✔ Use o aplicativo oficial "Meu Imposto de Renda" (Android/iOS) ou o programa PGFN da Receita Federal para enviar a declaração.');

    app.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <h3>Situação geral</h3>
          ${obrigBadge}
        </div>
        <div class="result-body">
          <div class="metric-grid">
            <div class="metric"><div class="m-label">Faturamento</div><div class="m-value">${fmt(r.fat)}</div></div>
            <div class="metric"><div class="m-label">Lucro apurado</div><div class="m-value success">${fmt(r.lucro)}</div></div>
            <div class="metric"><div class="m-label">IR pessoa física</div><div class="m-value ${r.irDevido > 0 ? 'danger' : 'success'}">${fmt(r.irDevido)}</div></div>
            <div class="metric"><div class="m-label">Tributos PJ (est.)</div><div class="m-value">${fmt(r.impostoPJ)}</div></div>
          </div>
          <div class="alert info">${regimeDica}</div>
          ${r.obrigado
            ? `<div class="alert warning">Você está obrigado a entregar a declaração de IRPF em 2025. Não deixe para a última hora — a multa mínima por atraso é R$ 165,74 e pode chegar a 20% do imposto devido.</div>`
            : `<div class="alert success">Com base nos dados informados, você pode não ser obrigado a declarar. Confirme com seu contador para ter certeza.</div>`
          }
        </div>
      </div>

      <div class="result-card">
        <div class="result-header"><h3>Cálculo do IR pessoa física</h3></div>
        <div class="result-body">
          <div class="item-row"><span class="item-label">Pró-labore / renda da empresa</span><span class="item-value">${fmt(r.prolabore)}</span></div>
          <div class="item-row"><span class="item-label">Outras rendas (aluguéis, CLT, etc.)</span><span class="item-value">${fmt(r.outrasRendas)}</span></div>
          <div class="item-row"><span class="item-label">(−) Dedução por dependentes (${r.deps})</span><span class="item-value">− ${fmt(r.deducaoDeps)}</span></div>
          <div class="item-row"><span class="item-label">(−) Despesas dedutíveis pessoais</span><span class="item-value">− ${fmt(r.dedPessoais)}</span></div>
          <div class="item-row" style="font-weight:600"><span class="item-label">Base de cálculo</span><span class="item-value">${fmt(r.base)}</span></div>
          <div class="item-row" style="font-weight:600;font-size:15px"><span class="item-label">IR estimado a pagar</span><span class="item-value">${fmt(r.irDevido)}</span></div>
        </div>
      </div>

      <div class="result-card">
        <div class="result-header"><h3>Prazos importantes</h3></div>
        <div class="result-body">${prazoHtml}</div>
      </div>

      <div class="result-card">
        <div class="result-header"><h3>Documentos para reunir</h3></div>
        <div class="result-body">
          <ul class="checklist">
            <li><span class="ck">✓</span> Informe de rendimentos da empresa (pró-labore e lucros)</li>
            <li><span class="ck">✓</span> Extratos bancários e de investimentos</li>
            <li><span class="ck">✓</span> Recibos de despesas médicas e odontológicas</li>
            <li><span class="ck">✓</span> Comprovantes de educação (escola, faculdade, cursos)</li>
            <li><span class="ck">✓</span> CPF de todos os dependentes declarados</li>
            <li><span class="ck">✓</span> Declaração de IR do ano anterior (se houver)</li>
            <li><span class="ck">✓</span> Escritura/contrato de compra e venda de bens (imóveis, veículos)</li>
            ${r.tipo === 'mei' ? '<li><span class="ck">✓</span> Relatório mensal de receitas do MEI</li>' : ''}
            <li><span class="ck">✓</span> Comprovantes de previdência privada (PGBL/VGBL)</li>
          </ul>
        </div>
      </div>

      <div class="result-card">
        <div class="result-header"><h3>Dicas para pagar menos IR legalmente</h3></div>
        <div class="result-body">
          ${dicas.map(d => `<div class="alert info">${d}</div>`).join('')}
        </div>
      </div>

      <div class="result-actions">
        <button class="btn btn-secondary" onclick="restart()">← Refazer simulação</button>
      </div>
    `;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restart() {
    Object.keys(state).forEach(k => delete state[k]);
    currentStep = 0;
    buildVisible();
    renderDots();
    updateProgress();
    renderStep(visibleSteps[0]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  buildVisible();
  renderDots();
  updateProgress();
  renderStep(visibleSteps[0]);
</script>
</body>
</html>
